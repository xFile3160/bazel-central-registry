bcr_test_module:
  module_path: "tests"
  matrix:
    platform: ["ubuntu2004", "macos_arm64"]
    bazel: ["8.x"]
  tasks:
    verify_targets:
      name: "Verify perfetto targets with consumer protobuf override"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - "@perfetto//:libperfetto"
      - "@perfetto//:trace_processor_shell"
      - "@perfetto//:ipc_plugin"
      - "@perfetto//:cppgen_plugin"
      - "@perfetto//:protozero_plugin"
