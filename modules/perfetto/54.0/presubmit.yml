bcr_test_module:
  module_path: ""
  matrix:
    platform: ["ubuntu2004", "macos_arm64"]
    bazel: ["8.x"]
  tasks:
    verify_targets:
      name: "Verify perfetto public targets"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - "@perfetto//:libperfetto"
      - "@perfetto//:trace_processor_shell"
